apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameserverallocations.director.gamefleet.io
spec:
  group: director.gamefleet.io
  names:
    kind: GameServerAllocation
    listKind: GameServerAllocationList
    plural: gameserverallocations
    singular: gameserverallocation
    shortNames:
      - gsa
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["fleetRef"]
              properties:
                fleetRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                selectors:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                strategy:
                  type: string
                  enum: ["FewestPlayers", "LowestLatency", "RoundRobin", "StrictBinPack"]
                players:
                  type: object
                  properties:
                    regions:
                      type: array
                      items:
                        type: string
                    preferredLatencyMs:
                      type: integer
                ttlSeconds:
                  type: integer
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Allocated", "Failed", "Released"]
                gameServer:
                  type: object
                  properties:
                    name:
                      type: string
                    endpoint:
                      type: string
                    node:
                      type: string
                playerCount:
                  type: integer
                allocatedAt:
                  type: string
                  format: date-time
                sessionId:
                  type: string
                message:
                  type: string
