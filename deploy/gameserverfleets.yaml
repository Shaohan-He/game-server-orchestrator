apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameserverfleets.director.gamefleet.io
spec:
  group: director.gamefleet.io
  names:
    kind: GameServerFleet
    listKind: GameServerFleetList
    plural: gameserverfleets
    singular: gameserverfleet
    shortNames:
      - gsf
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["template"]
              properties:
                template:
                  type: object
                  required: ["spec"]
                  properties:
                    metadata:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    spec:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                autoscalerRef:
                  type: object
                  properties:
                    name:
                      type: string
                healthCheck:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                sessionQuery:
                  type: object
                  properties:
                    httpGet:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    periodSeconds:
                      type: integer
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                paused:
                  type: boolean
            status:
              type: object
              properties:
                replicas:
                  type: integer
                readyReplicas:
                  type: integer
                allocatedReplicas:
                  type: integer
                drainingReplicas:
                  type: integer
                bufferPool:
                  type: integer
                totalPlayers:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
