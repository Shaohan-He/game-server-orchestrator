apiVersion: v1
kind: Namespace
metadata:
  name: game-fleet-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game-fleet-director-controller
  namespace: game-fleet-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-fleet-director-controller
  namespace: game-fleet-system
  labels:
    app: game-fleet-director
    component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-fleet-director
      component: controller
  template:
    metadata:
      labels:
        app: game-fleet-director
        component: controller
    spec:
      serviceAccountName: game-fleet-director-controller
      containers:
        - name: controller
          image: ghcr.io/shaohan-he/game-fleet-director-controller:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-addr=:0
            - --namespace=game-fleet-system
            - --resync-period=15s
          env:
            - name: GFD_NHW_ENDPOINT
              value: ""
            - name: GFD_NOTIFY_FEISHU_URL
              value: ""
            - name: GFD_NOTIFY_DINGTALK_URL
              value: ""
            - name: GFD_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pgrep
                - game-fleet-director
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pgrep
                - game-fleet-director
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
